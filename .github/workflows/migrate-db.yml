name: Apply DB migration

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "supabase/migrate-country-indexes.sql"
      - "supabase/schema.sql"
      - ".github/workflows/migrate-db.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          QUERY=$(node -e "const fs=require('fs');process.stdout.write(JSON.stringify(fs.readFileSync('supabase/migrate-country-indexes.sql','utf8')))")
          curl -sf -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":${QUERY}}"
